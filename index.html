<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaprak Arşivim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;font-family:Georgia,serif;color:#2d2a24}
.header{background:#2d4a1e;padding:18px 16px;position:sticky;top:0;z-index:10}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:560px;margin:0 auto}
.header-title{font-size:18px;color:#e8f0d8;font-weight:normal}
.header-count{font-size:11px;color:#8aaa68;letter-spacing:2px;margin-top:2px}
.add-btn{background:#5a7a3a;color:#fff;border:none;border-radius:8px;width:36px;height:36px;font-size:22px;cursor:pointer}
.wrap{max-width:560px;margin:0 auto;padding:14px 16px 60px}
.form-box{background:#fff;border:1px solid #d4e8b8;border-radius:14px;padding:16px;margin-bottom:14px;display:none}
.form-label{font-size:11px;color:#8aaa68;letter-spacing:1px;margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 11px;border:1px solid #d4e8b8;border-radius:8px;font-size:14px;background:#f9fdf5;color:#2d2a24;font-family:Georgia,serif;outline:none;margin-bottom:10px}
.form-row{display:flex;gap:10px}
.submit-btn{width:100%;background:#2d4a1e;color:#e8f0d8;border:none;border-radius:10px;padding:12px;font-size:15px;cursor:pointer;margin-top:4px}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #c8d8a8;background:#fff;color:#5a7a3a;font-size:13px;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:#2d4a1e;color:#e8f0d8;border-color:#2d4a1e}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;border:1.5px solid transparent}
.card.sel{border-color:#8aaa68}
.card-name{font-size:16px;margin-bottom:4px}
.card-loc{font-size:12px;color:#8aaa68;margin-bottom:2px}
.card-date{font-size:12px;color:#aab890}
.card-actions{margin-top:10px;display:flex;gap:8px}
.tag{background:#f0f8e8;border:1px solid #c8d8a8;border-radius:8px;padding:4px 10px;font-size:12px;color:#5a7a3a}
.del-btn{background:#fdf0f0;border:1px solid #e8c8c8;border-radius:8px;padding:4px 10px;font-size:12px;color:#c85a5a;cursor:pointer}
.empty{text-align:center;padding:50px 20px;color:#aab890}
.saved{position:fixed;bottom:20px;right:20px;background:#2d4a1e;color:#e8f0d8;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="28" height="28" viewBox="0 0 100 100"><path d="M50,8 C65,5 82,18 82,38 C88,42 88,58 78,62 C74,74 63,82 50,82 C37,82 26,74 22,62 C12,58 12,42 18,38 C18,18 35,5 50,8Z" fill="#a8c878" opacity=".85"/><path d="M50,80 Q52,55 54,30" stroke="#2d4a1e" stroke-width="1.5" fill="none"/></svg>
      <div>
        <div class="header-title">Yaprak Arşivim</div>
        <div class="header-count" id="count">0 KAYIT</div>
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="toggleForm()">+</button>
  </div>
</div>
<div class="wrap">
  <div class="form-box" id="form">
    <label class="form-label">YAPRAK ADI</label>
    <input class="form-input" id="fName" placeholder="örn. Meşe Yaprağı">
    <label class="form-label">BULUNDUĞU YER</label>
    <input class="form-input" id="fLoc" placeholder="örn. Yamanlar Dağı">
    <label class="form-label">TÜR</label>
    <input class="form-input" id="fType" placeholder="örn. Meşe">
    <div class="form-row">
      <div style="flex:1">
        <label class="form-label">TARİH</label>
        <input class="form-input" type="date" id="fDate">
      </div>
      <div>
        <label class="form-label">RENK</label>
        <input type="color" id="fColor" value="#5a7a3a" style="width:48px;height:38px;border:1px solid #d4e8b8;border-radius:8px;cursor:pointer;margin-top:4px">
      </div>
    </div>
    <button class="submit-btn" onclick="addLeaf()">Arşive Ekle</button>
  </div>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
</div>
<div class="saved" id="saved">✓ Kaydedildi</div>
<script>
var leaves=JSON.parse(localStorage.getItem("yapraklar")||"[]");
var filter="Tümü",selected=null,showForm=false;
function save(){localStorage.setItem("yapraklar",JSON.stringify(leaves));var el=document.getElementById("saved");el.style.opacity="1";setTimeout(function(){el.style.opacity="0";},1500);}
function svg(c,s){s=s||56;return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 100 100" style="flex-shrink:0"><path d="M50,8 C65,5 82,18 82,38 C88,42 88,58 78,62 C74,74 63,82 50,82 C37,82 26,74 22,62 C12,58 12,42 18,38 C18,18 35,5 50,8Z" fill="'+c+'" opacity=".85"/><path d="M50,80 Q52,55 54,30" stroke="#2d4a1e" stroke-width="1.5" fill="none" opacity=".4"/></svg>';}
function fmt(d){var m=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"],p=d.split("-");return p[2]+" "+m[+p[1]-1]+" "+p[0];}
function render(){
  document.getElementById("count").textContent=leaves.length+" KAYIT";
  var types=["Tümü"];
  leaves.forEach(function(l){if(types.indexOf(l.type)<0)types.push(l.type);});
  document.getElementById("filters").innerHTML=types.map(function(t){return'<button class="filter-btn'+(filter===t?' active':'')+'" onclick="setFilter(\''+t+'\')">'+t+'</button>';}).join("");
  var f=leaves.filter(function(l){return filter==="Tümü"||l.type===filter;});
  if(!f.length){document.getElementById("cards").innerHTML='<div class="empty"><p>Henüz yaprak yok.</p><p style="font-size:13px;margin-top:8px">+ butonuna bas ve ilk yaprağını ekle.</p></div>';return;}
  document.getElementById("cards").innerHTML=f.map(function(l){var s=selected===l.id;return'<div class="card'+(s?' sel':'')+'" onclick="sel('+l.id+')">'+svg(l.color)+'<div style="flex:1"><div class="card-name">'+l.name+'</div><div class="card-loc">📍 '+l.location+'</div><div class="card-date">🗓 '+fmt(l.date)+'</div>'+(s?'<div class="card-actions"><span class="tag">'+l.type+'</span><button class="del-btn" onclick="del(event,'+l.id+')">Sil</button></div>':'')+' </div></div>';}).join("");
}
function toggleForm(){showForm=!showForm;document.getElementById("form").style.display=showForm?"block":"none";document.getElementById("addBtn").textContent=showForm?"✕":"+";}
function setFilter(t){filter=t;selected=null;render();}
function sel(id){selected=selected===id?null:id;render();}
function del(e,id){e.stopPropagation();leaves=leaves.filter(function(l){return l.id!==id;});selected=null;save();render();}
function addLeaf(){
  var n=document.getElementById("fName").value.trim(),l=document.getElementById("fLoc").value.trim(),d=document.getElementById("fDate").value,t=document.getElementById("fType").value.trim()||"Diğer",c=document.getElementById("fColor").value;
  if(!n||!l||!d){alert("Ad, yer ve tarih zorunlu.");return;}
  leaves.push({id:Date.now(),name:n,location:l,date:d,type:t,color:c});
  document.getElementById("fName").value=document.getElementById("fLoc").value=document.getElementById("fDate").value=document.getElementById("fType").value="";
  toggleForm();save();render();
}
render();
</script>
</body>
</html>
